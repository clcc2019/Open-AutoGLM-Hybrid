name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      run: chmod +x android-app/gradlew

    - name: Check if signing is configured
      id: check_signing
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "has_signing=true" >> $GITHUB_OUTPUT
        else
          echo "has_signing=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup Keystore
      if: steps.check_signing.outputs.has_signing == 'true'
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-app/app/keystore.jks
        chmod 600 android-app/app/keystore.jks

    - name: Build Signed Release APK
      if: steps.check_signing.outputs.has_signing == 'true'
      env:
        KEYSTORE_FILE: keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android-app
        ./gradlew assembleRelease --stacktrace

    - name: Upload Signed Release APK
      if: steps.check_signing.outputs.has_signing == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: AutoGLM-Release
        path: android-app/app/build/outputs/apk/release/app-release.apk

    - name: Build Debug APK (fallback when no signing configured)
      if: steps.check_signing.outputs.has_signing != 'true'
      run: |
        cd android-app
        ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      if: steps.check_signing.outputs.has_signing != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: AutoGLM-Debug
        path: android-app/app/build/outputs/apk/debug/app-debug.apk

    - name: Clean up keystore
      if: always()
      run: rm -f android-app/app/keystore.jks
