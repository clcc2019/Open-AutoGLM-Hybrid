name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      run: chmod +x android-app/gradlew
      
    - name: Build Debug APK
      run: |
        cd android-app
        ./gradlew assembleDebug --stacktrace
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AutoGLM-Helper-Debug
        path: android-app/app/build/outputs/apk/debug/app-debug.apk
        
    # 构建带签名的 Release APK (需要配置 GitHub Secrets)
    - name: Setup Keystore for Release Build
      if: startsWith(github.ref, 'refs/tags/') && secrets.KEYSTORE_BASE64 != ''
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-app/keystore.jks
        chmod 600 android-app/keystore.jks
        
    - name: Build Signed Release APK
      if: startsWith(github.ref, 'refs/tags/') && secrets.KEYSTORE_BASE64 != ''
      env:
        KEYSTORE_FILE: android-app/keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android-app
        ./gradlew assembleRelease --stacktrace
        
    - name: Upload Signed Release APK
      if: startsWith(github.ref, 'refs/tags/') && secrets.KEYSTORE_BASE64 != ''
      uses: actions/upload-artifact@v4
      with:
        name: AutoGLM-Helper-Release-Signed
        path: android-app/app/build/outputs/apk/release/app-release.apk
        
    # 如果没有配置签名，构建未签名的 Release APK
    - name: Build Unsigned Release APK (on tag)
      if: startsWith(github.ref, 'refs/tags/') && (secrets.KEYSTORE_BASE64 == '' || secrets.KEYSTORE_BASE64 == null)
      run: |
        cd android-app
        ./gradlew assembleRelease --stacktrace
        
    - name: Upload Unsigned Release APK (on tag)
      if: startsWith(github.ref, 'refs/tags/') && (secrets.KEYSTORE_BASE64 == '' || secrets.KEYSTORE_BASE64 == null)
      uses: actions/upload-artifact@v4
      with:
        name: AutoGLM-Helper-Release-Unsigned
        path: android-app/app/build/outputs/apk/release/app-release.apk
        
    # 清理敏感文件
    - name: Clean up keystore
      if: always() && startsWith(github.ref, 'refs/tags/')
      run: |
        rm -f android-app/keystore.jks
